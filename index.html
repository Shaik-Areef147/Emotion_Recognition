<!DOCTYPE html>
<html>

<head>

<title>Emotion Recognition AI</title>

<style>

body{
background:linear-gradient(
135deg,
#667eea,
#764ba2,
#ff6ec4
);

font-family:Arial;

height:100vh;

display:flex;

justify-content:center;

align-items:center;
}

.container{

background:white;

padding:30px;

border-radius:20px;

width:500px;

text-align:center;

box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

h1{

color:#6a11cb;
}

button{

background:#6a11cb;

color:white;

padding:12px 25px;

border:none;

border-radius:10px;

cursor:pointer;
}

.result{

font-size:30px;

margin-top:20px;

font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<h1>🎤 Emotion Recognition AI 🤖</h1>

<form method="POST"
enctype="multipart/form-data">

<input type="file"
name="audio"
required>

<br><br>

<button type="submit">
Predict Emotion
</button>

</form>

{% if prediction %}

<div class="result">

{{ prediction }}

</div>

{% endif %}

</div>

</body>

</html>
